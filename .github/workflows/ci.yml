name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Safety boundary
        run: |
          for path in .env .env.local .env.production .repomind dist eval benchmark repomind repomind.exe; do
            git check-ignore --quiet -- "$path"
          done
          if git check-ignore --quiet -- .env.example; then
            echo ".env.example must remain trackable"
            exit 1
          fi
          forbidden="$(git ls-files .env '.env.*' .repomind dist eval benchmark repomind repomind.exe | grep -v '^\.env\.example$' || true)"
          if [ -n "$forbidden" ]; then
            echo "Forbidden generated or secret files are tracked:"
            echo "$forbidden"
            exit 1
          fi
          if git grep -nE "(OPENAI_API_KEY|ANTHROPIC_API_KEY|CLAUDE_API_KEY|GEMINI_API_KEY|GOOGLE_API_KEY|GROK_API_KEY|XAI_API_KEY|[A-Z0-9_]*TOKEN|[A-Z0-9_]*SECRET)[[:space:]]*=[[:space:]]*(sk-|xai-|gsk_|AIza|ghp_|glpat-)" -- . ':!*.png' ':!*.ico' ':!*.jpg' ':!*.jpeg' ':!*.webp'; then
            echo "Tracked files contain likely real API keys or tokens"
            exit 1
          fi

      - name: Analyze smoke English
        run: |
          OUT="$RUNNER_TEMP/repomind-analyze-en"
          go run ./cmd/repomind analyze --output "$OUT" testdata/fixtures/api-repo
          test -f "$OUT/analysis.json"
          test -f "$OUT/report.html"

      - name: Analyze smoke Chinese
        run: |
          OUT="$RUNNER_TEMP/repomind-analyze-zh"
          go run ./cmd/repomind analyze --lang zh --output "$OUT" testdata/fixtures/api-repo
          test -f "$OUT/analysis.json"
          test -f "$OUT/report.html"
          grep -q '"language": "zh"' "$OUT/analysis.json"

      - name: Trace and diagnose smoke
        run: |
          OUT="$RUNNER_TEMP/repomind-trace-diagnose"
          go run ./cmd/repomind analyze --output "$OUT" testdata/fixtures/diagnose-repo
          go run ./cmd/repomind trace testdata/fixtures/diagnose-repo --analysis "$OUT/analysis.json" --symbol update_order_status | tee "$RUNNER_TEMP/repomind-trace.txt"
          grep -q 'update_order_status -> save' "$RUNNER_TEMP/repomind-trace.txt"
          grep -q 'Mermaid:' "$RUNNER_TEMP/repomind-trace.txt"
          go run ./cmd/repomind diagnose testdata/fixtures/diagnose-repo --analysis "$OUT/analysis.json" --issue "order status error" | tee "$RUNNER_TEMP/repomind-diagnose.txt"
          grep -q '\[state\]' "$RUNNER_TEMP/repomind-diagnose.txt"
          grep -q '\[database\]' "$RUNNER_TEMP/repomind-diagnose.txt"
